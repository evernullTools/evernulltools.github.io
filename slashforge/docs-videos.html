<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SlashForge Videos | Evernull Tools</title>
    <meta name="description" content="SlashForge video guides and feature demonstrations.">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            background: #050914;
            color: #f2f2f2;
            font-family: Arial, Helvetica, sans-serif;
        }

        .page {
            max-width: 980px;
            margin: 0 auto;
            padding: 48px 24px 80px;
        }

        h1 {
            color: #ff7a1a;
            letter-spacing: 0.08em;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #d9c18d;
            margin-bottom: 40px;
            font-size: 18px;
        }

        .video-card {
            margin-bottom: 48px;
            padding: 20px;
            background: rgba(255,255,255,0.045);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
        }

        .video-card h2 {
            margin-top: 0;
            color: #f0c46f;
        }

        video {
            width: 100%;
            border-radius: 10px;
            background: #000;
            display: block;
        }

        a {
            color: #ff9a3d;
        }
    </style>
</head>

<body>
    <main class="page">
        <h1>SlashForge Videos</h1>
        <p class="subtitle">Video guides and feature demonstrations for SlashForge — Combat Trail Creator.</p>

        <section class="video-card" id="trailer">
            <h2>Trailer</h2>
            <video controls preload="metadata">
                <source src="../videos/slashforge/trailer.mp4" type="video/mp4">
                Your browser does not support video playback.
            </video>
        </section>

        <section class="video-card" id="quick-setup">
            <h2>Quick Setup</h2>
            <video controls preload="metadata">

                Your browser does not support video playback.
            </video>
        </section>

        <section class="video-card" id="smoothing">
            <h2>Low-FPS Smoothing</h2>
            <video controls preload="metadata">
                <source src="../videos/slashforge/smoothing.mp4" type="video/mp4">
                Your browser does not support video playback.
            </video>
        </section>

        <section class="video-card" id="gradPercent06">
            <h2>Gradient Percentage</h2>
            <video controls preload="metadata">
                <source src="../videos/slashforge/gradientPercentage_06.mp4" type="video/mp4">
                Your browser does not support video playback.
            </video>
        </section>

        <section class="video-card" id="fade-out">
            <h2>Smooth Trail Endings</h2>
            <video controls preload="metadata">

                Your browser does not support video playback.
            </video>
        </section>

        <section class="video-card" id="layered-visuals">
            <h2>Layered Visuals</h2>
            <video controls preload="metadata">
                <source src="../videos/slashforge/layered-visuals.mp4" type="video/mp4">
                Your browser does not support video playback.
            </video>
        </section>

        <section class="video-card" id="custom-shader-data">
            <h2>Custom Shader Data</h2>
            <video controls preload="metadata">
                <source src="../videos/slashforge/custom-shader-data.mp4" type="video/mp4">
                Your browser does not support video playback.
            </video>
        </section>
    </main>
</body>
</html>
